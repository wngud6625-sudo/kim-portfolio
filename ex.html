<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KIM NOTEBOOK</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="notebook">

    <!-- PAGE -->

    <div class="page-label">
        PAGE 00
    </div>

    <div class="top-line"></div>

    <!-- TITLE -->

    <div class="title-wrap">

        <div class="marker"></div>

        <h1 class="title kim">
            KIM
        </h1>

        <h1 class="title notebook-title">
            NOTEBOOK
        </h1>

        <div class="volume">
            VOLUME 01
        </div>

    </div>

    <!-- PROFILE -->

    <div class="profile">

        <h2>Video Editor</h2>

        <p>kim joo-hyung</p>

    </div>

    <!-- STAMP -->

    <div class="stamp">

        <span>PORTFOLIO</span>

        <strong>2026</strong>

        <small>VIDEO EDITOR</small>

    </div>

    <!-- MEMO -->

    <div class="memo">

        <div class="tape"></div>

        <h3>TODAY LOG</h3>

        <div class="memo-line"></div>

        <ul>

            <li>☑ Motion Design</li>

            <li>☑ Video Editing</li>

            <li>☑ Infographic</li>

            <li>☑ Story Telling</li>

        </ul>

    </div>

    <!-- POLAROID -->

    <div class="polaroid">

        <div class="polaroid-tape"></div>

        <img
        src="workspace.jpg"
        alt="workspace">

        <p>
            edit. Design. Motion
        </p>

    </div>

    <!-- DOODLE -->

    <div class="star">
        ☆
    </div>

    <!-- START TEXT -->

    <div class="start-text">

        Let's Start!

    </div>

    <!-- BUTTON -->

    <button class="open-btn">

        OPEN NOTEBOOK

    </button>

</div>

<script src="script.js"></script>

</body>
</html>
